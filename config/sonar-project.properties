# =============================================================================
# SonarQube Project Configuration - PPT Comercial SEIDOR
# =============================================================================
sonar.projectKey=ppt-comercial-seidor
sonar.projectName=PPT Comercial SEIDOR - Grow Deck Automator
sonar.projectVersion=2.0

# Source code
sonar.sources=.
sonar.exclusions=**/__pycache__/**,**/*.pptx,**/*.xlsx,**/*.db,**/*.zip,**/generated_decks/**,**/sonar-scanner/**,**/.git/**,**/*.md
sonar.inclusions=**/*.py,**/*.css,**/*.html

# Python analysis
sonar.python.version=3.11
sonar.python.coverage.reportPaths=

# Encoding
sonar.sourceEncoding=UTF-8

# Reports
sonar.verbose=true
