version: '3.8'

services:
  web:
    build: .
    container_name: grow_deck_automator
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./generated_decks:/app/generated_decks
      - ./Estimador S0 V2.0.xlsx:/app/Estimador S0 V2.0.xlsx:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DB_NAME=/app/data/proposals.db
      - OUTPUT_DIR=/app/generated_decks
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      db-init:
        condition: service_completed_successfully

  db-init:
    image: python:3.11-slim
    volumes:
      - ./data:/app/data
      - .:/app/src
    working_dir: /app/src
    environment:
      - DB_NAME=/app/data/proposals.db
    command: >
      sh -c "python database_setup.py && echo 'DB initialized'"
    restart: "no"
