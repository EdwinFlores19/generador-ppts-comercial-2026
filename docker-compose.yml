version: '3.8'

services:
  web:
    build: .
    container_name: grow_deck_automator
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      # Evitar sobreescribir dependencias de python en el volumen montado
      - /app/venv
      - /app/__pycache__
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
